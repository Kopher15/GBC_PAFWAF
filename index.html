<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GBC Pickleball Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Mono","Courier New",monospace;background:#080d08;color:#eef4e8;min-height:100vh}
.hdr{background:#0f150f;border-bottom:2px solid #afe409;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(175,228,9,.3);flex-shrink:0}
.tt{font-family:'Barlow Condensed',sans-serif;font-style:italic;font-size:16px;font-weight:900;color:#fff;letter-spacing:.02em;text-transform:uppercase;line-height:1}
.tt span{color:#afe409}
.sb{font-size:9px;color:#5a6e5a;letter-spacing:1px;margin-top:2px}
.nav{display:flex;background:#0f150f;border-bottom:1px solid #1a271a;padding:0 20px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{background:none;border:none;color:#5a6e5a;border-bottom:2px solid transparent;padding:11px 14px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;font-family:inherit;transition:color .15s}
.nav button.on{color:#afe409;border-bottom-color:#afe409}
.nav button:hover:not(.on){color:#eef4e8}
.pg{padding:20px 22px;display:none;max-width:1280px;margin:0 auto}.pg.on{display:block}
.card{background:#0f150f;border:1px solid #1a271a;border-radius:8px;padding:18px;margin-bottom:14px}
.ct{font-size:10px;font-weight:700;letter-spacing:2px;color:#afe409;text-transform:uppercase;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}.g4{grid-template-columns:repeat(2,1fr)}}
.stat{background:#080d08;border:1px solid #1a271a;border-radius:6px;padding:14px;text-align:center}
.sn{font-size:28px;font-weight:700;color:#afe409;line-height:1}
.sl{font-size:9px;color:#5a6e5a;letter-spacing:2px;margin-top:3px;text-transform:uppercase}
label{font-size:10px;color:#5a6e5a;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px;margin-top:12px}
input,select,textarea{width:100%;background:#080d08;border:1px solid #1a271a;border-radius:5px;padding:9px 11px;color:#afe409;font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#afe40988}
textarea{min-height:120px;resize:vertical}
.btn{background:#afe409;color:#080d08;border:none;border-radius:5px;padding:9px 18px;font-family:inherit;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.bto{background:none;color:#afe409;border:1px solid #afe409;border-radius:5px;padding:7px 14px;font-family:inherit;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .15s}
.bto:hover{opacity:.75}
.bbl{background:#38bdf8;color:#000;border:none;border-radius:5px;padding:5px 12px;font-family:inherit;font-weight:700;font-size:10px;cursor:pointer}
.pill{display:inline-block;border-radius:999px;padding:2px 9px;font-size:10px;font-weight:700}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tc{background:#080d08;border:1px solid #1a271a;border-radius:5px;padding:10px 14px;margin-bottom:8px}
.mc{background:#080d08;border-radius:6px;overflow:hidden;margin-bottom:8px}
.mh{background:#141e14;padding:4px 10px;font-size:9px;font-weight:700;letter-spacing:1px;display:flex;justify-content:space-between}
.mr{padding:8px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a271a}
.mr:last-child{border-bottom:none}
.ms{font-size:15px;font-weight:700;min-width:22px;text-align:right}
.mf{padding:6px 10px;background:#141e14;border-top:1px solid #1a271a}
.prog{background:#0f150f;border-radius:3px;height:5px;overflow:hidden;margin-bottom:8px}
.pb{height:100%;background:#afe409;transition:width .4s}
.rh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rs{width:3px;height:28px;border-radius:2px;flex-shrink:0}
.bg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:20px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:99;overflow-y:auto;padding:20px}
.md{background:#0f150f;border:1px solid #afe409;border-radius:10px;padding:24px;width:100%;max-width:460px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:6px;font-weight:700;font-size:12px;z-index:200;white-space:nowrap;display:none;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.err{color:#ef4444;font-size:11px;margin-top:8px}
.mu{color:#5a6e5a;font-size:12px}
.bo3{width:100%;border-collapse:collapse;margin:10px 0}
.bo3 th{font-size:9px;color:#5a6e5a;letter-spacing:1px;text-transform:uppercase;padding:4px 8px;text-align:center;font-weight:700}
.bo3 td{padding:6px 4px;text-align:center}
.bo3 .tn{font-size:11px;font-weight:700;color:#eef4e8;text-align:left;padding-left:8px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.bo3 input{width:62px;text-align:center;font-size:18px;font-weight:700;padding:6px 4px;background:#080d08;border:1px solid #1a271a;border-radius:4px;color:#afe409}
.bo3 .gdim{opacity:.35}
.bo3 tr.won td{background:#4d7c0f22}
.gscore{font-size:11px;color:#5a6e5a;margin-top:6px}
/* form embed */
.form-frame{width:100%;border:none;border-radius:8px;min-height:600px;background:#fff}
.sync-banner{background:#1a271a;border:1px solid #afe40944;border-radius:6px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
</style>
</head>

<script>

  updateSubstitutes:["teamId","sub1","sub2"],

var A={teams:[],matches:[],emails:[],tab:"dashboard",bcat:"Mens Doubles",sm:null,formUrl:""};

  ["teams","Teams"],["bracket","Bracket"],
  ["scores","Scores"],["announce","Announce"],["emails","Emails"]
];

function $(i){return document.getElementById(i);}
function v(i){var e=$(i);return e?e.value.trim():"";}
function tx(i,s){var e=$(i);if(e)e.textContent=s;}
function gt(id){for(var i=0;i<A.teams.length;i++)if(A.teams[i].ID===id)return A.teams[i];return null;}
function gr(id){for(var i=0;i<RD.length;i++)if(RD[i].id===id)return RD[i];return RD[0];}
function pill(l,c){return '<span class="pill" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+l+'</span>';}

function toast(msg,col){
  var el=$("toast");
  el.textContent=msg;
  el.style.background=col||"#afe409";
  el.style.color=(col&&col!=="#afe409")?"#fff":"#080d08";
  el.style.display="block";
  setTimeout(function(){el.style.display="none";},3200);
}

function buildNav(){
  var n=$("nav");n.innerHTML="";
  TABS.forEach(function(tb){
    var b=document.createElement("button");
    b.textContent=tb[1];b.className=A.tab===tb[0]?"on":"";
    b.onclick=function(){go(tb[0]);};n.appendChild(b);
  });
}

function go(tab){
  A.tab=tab;
  document.querySelectorAll(".pg").forEach(function(p){p.classList.remove("on");});
  $("pg-"+tab).classList.add("on");
  buildNav();draw(tab);
}

function draw(tab){
  if(tab==="dashboard")dDash();
  else if(tab==="register")dReg();
  else if(tab==="teams")dTeams();
  else if(tab==="bracket")dBracket();
  else if(tab==="scores")dScores();
  else if(tab==="announce")dAnn();
  else if(tab==="emails")dEmails();
}

function call(fn,args,cb){
  var names=ARGMAP[fn]||[];
  var url=API_URL+"?action="+encodeURIComponent(fn);
  for(var i=0;i<names.length;i++){
    var val=args&&args[i];
    if(val&&typeof val==="object")val=JSON.stringify(val);
    url+="&"+names[i]+"="+encodeURIComponent(val==null?"":val);
  }
  fetch(url)
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(d){if(cb)cb(d);})
    .catch(function(e){toast("Error: "+e.message,"#ef4444");});
}

function load(cb){
  call("getData",[],function(r){
    if(r&&r.ok){A.teams=r.teams||[];A.matches=r.matches||[];A.emails=r.emails||[];}
    cnt();if(cb)cb();
  });
}

function cnt(){
  var m=A.teams.filter(function(t){return t.Category==="Mens Doubles";}).length;
  var w=A.teams.filter(function(t){return t.Category==="Womens Doubles";}).length;
  $("cnt").innerHTML=
    '<div style="text-align:center"><div style="font-size:15px;font-weight:700;color:#afe409">'+m+'/12</div><div style="font-size:9px;color:#5a6e5a">MEN\'S</div></div>'+
    '<div style="text-align:center"><div style="font-size:15px;font-weight:700;color:#afe409">'+w+'/12</div><div style="font-size:9px;color:#5a6e5a">WOMEN\'S</div></div>';
}

       '<div style="font-size:10px;color:#5a6e5a">'+rd+'/'+rt+' &middot; '+pct+'%</div></div>';

  h+='</div></div>';
  h+='<div class="g2">';

function openScore(mid){
  var m=null;
  for(var i=0;i<A.matches.length;i++)if(A.matches[i].ID===mid){m=A.matches[i];break;}
  if(!m)return;A.sm=m;
  var t1=gt(m.Team1ID),t2=gt(m.Team2ID),r=gr(parseInt(m.Round));
  var t1n=t1?t1.TeamName:"Team 1";
  var t2n=t2?t2.TeamName:"Team 2";
  $("md").innerHTML=
    '<div style="font-size:11px;color:#afe409;font-weight:700;letter-spacing:2px;margin-bottom:4px">ENTER SCORES &mdash; BEST OF 3</div>'+
    '<div style="font-size:12px;color:#5a6e5a;margin-bottom:4px">'+r.label+' &middot; '+r.date+'</div>'+
    '<div style="font-size:11px;color:#5a6e5a;margin-bottom:14px">First team to win 2 games wins the match.</div>'+
    '<table class="bo3"><thead><tr>'+
    '<th style="text-align:left">Team</th><th>Game 1</th><th>Game 2</th>'+
    '<th>Game 3 <span style="font-size:8px;color:#5a6e5a">(if needed)</span></th>'+
    '</tr></thead><tbody>'+
    '<tr id="row-t1"><td class="tn">'+t1n+'</td>'+
    '<td><input id="g1t1" type="number" min="0" placeholder="0" oninput="liveCalc()"></td>'+
    '<td><input id="g2t1" type="number" min="0" placeholder="0" oninput="liveCalc()"></td>'+
    '<td class="gdim"><input id="g3t1" type="number" min="0" placeholder="0" oninput="liveCalc()"></td>'+
    '</tr><tr id="row-t2"><td class="tn">'+t2n+'</td>'+
    '<td><input id="g1t2" type="number" min="0" placeholder="0" oninput="liveCalc()"></td>'+
    '<td><input id="g2t2" type="number" min="0" placeholder="0" oninput="liveCalc()"></td>'+
    '<td class="gdim"><input id="g3t2" type="number" min="0" placeholder="0" oninput="liveCalc()"></td>'+
    '</tr></tbody></table>'+
    '<div id="liveres" style="margin:10px 0;font-size:12px;color:#5a6e5a;min-height:20px"></div>'+
    '<div style="margin-top:14px;display:flex;gap:10px">'+
    '<button class="btn" style="flex:1" onclick="doScore()">Save &amp; Notify Players</button>'+
    '<button class="bto" style="border-color:#5a6e5a;color:#5a6e5a" onclick="closeScore()">Cancel</button></div>'+
    '<div class="err" id="serr"></div>';
  $("ov").style.display="flex";
  setTimeout(function(){var e=$("g1t1");if(e)e.focus();},80);
}

function liveCalc(){
  var games=getGames();var t1w=0,t2w=0;
  for(var i=0;i<2;i++){var g=games[i];if(g.t1!==""&&g.t2!==""){var s1=parseInt(g.t1),s2=parseInt(g.t2);if(!isNaN(s1)&&!isNaN(s2)&&s1!==s2){if(s1>s2)t1w++;else t2w++;}}}
  var needG3=t1w===1&&t2w===1;
  ["g3t1","g3t2"].forEach(function(id){var el=$(id);if(el){el.parentElement.className=needG3?"":"gdim";el.disabled=!needG3;if(!needG3)el.value="";}});
  var res="";
  if(t1w===2)res='<span style="color:#afe409;font-weight:700">'+(A.sm&&gt(A.sm.Team1ID)?gt(A.sm.Team1ID).TeamName:"Team 1")+' wins the match! &#127942;</span>';
  else if(t2w===2)res='<span style="color:#afe409;font-weight:700">'+(A.sm&&gt(A.sm.Team2ID)?gt(A.sm.Team2ID).TeamName:"Team 2")+' wins the match! &#127942;</span>';
  else if(needG3)res='<span style="color:#f59e0b">Tied 1&ndash;1 &mdash; Game 3 required!</span>';
  $("liveres").innerHTML=res;
}

function getGames(){return [{t1:v("g1t1"),t2:v("g1t2")},{t1:v("g2t1"),t2:v("g2t2")},{t1:v("g3t1"),t2:v("g3t2")}];}
function closeScore(){$("ov").style.display="none";}

function doScore(){
  var games=getGames();
  if(!games[0].t1||!games[0].t2){tx("serr","Enter scores for Game 1.");return;}
  if(!games[1].t1||!games[1].t2){tx("serr","Enter scores for Game 2.");return;}
  var t1w=0,t2w=0;
  for(var i=0;i<games.length;i++){
    var g=games[i];if(g.t1===""||g.t2==="")continue;
    var s1=parseInt(g.t1),s2=parseInt(g.t2);
    if(s1===s2){tx("serr","Game "+(i+1)+" scores cannot be tied.");return;}
    if(s1>s2)t1w++;else t2w++;
  }
  if(t1w<2&&t2w<2){tx("serr","A team must win 2 games. Check Game 3.");return;}
  tx("serr","Saving...");
  call("submitScore",[A.sm.ID,games],function(r){
    if(r&&r.ok){closeScore();toast(r.msg);load(function(){draw(A.tab);});}
    else{tx("serr",r?r.msg:"Error occurred");}
  });
}

  var tm=gt(tid);if(!tm)return;A.sm={ID:tid,_subs:true};
  $("md").innerHTML=
    '<div style="font-size:11px;color:#afe409;font-weight:700;letter-spacing:2px;margin-bottom:4px">EDIT SUBSTITUTES</div>'+
    '<div style="font-size:12px;color:#5a6e5a;margin-bottom:14px">'+tm.TeamName+' &middot; '+LBL[tm.Category]+'</div>'+
    '<div style="font-size:11px;color:#5a6e5a;margin-bottom:10px">Up to 2 substitute players (name only).</div>'+
    '<label>Substitute 1</label><input id="sub1in" placeholder="Full name" value="'+(tm.Sub1Name||"").replace(/"/g,"&quot;")+'">'+
    '<label>Substitute 2</label><input id="sub2in" placeholder="Full name" value="'+(tm.Sub2Name||"").replace(/"/g,"&quot;")+'">'+
    '<div style="margin-top:16px;display:flex;gap:10px">'+
    '<button class="btn" style="flex:1" onclick="saveSubs()">Save Substitutes</button>'+
    '<button class="bto" style="border-color:#5a6e5a;color:#5a6e5a" onclick="closeScore()">Cancel</button></div>'+
    '<div class="err" id="suberr"></div>';
  $("ov").style.display="flex";
}
function saveSubs(){
  tx("suberr","Saving...");
  call("updateSubstitutes",[A.sm.ID,v("sub1in"),v("sub2in")],function(r){
    if(r&&r.ok){closeScore();toast(r.msg);load(function(){draw(A.tab);});}
    else{tx("suberr",r?r.msg:"Error occurred");}
  });
}

// ── Assign Players Modal ───────────────────────────────────────────────────────
function roster(tm){
  var a=[];
  if(tm){
    if(tm.P1Name)a.push(tm.P1Name);
    if(tm.P2Name)a.push(tm.P2Name);
    if(tm.Sub1Name)a.push(tm.Sub1Name);
    if(tm.Sub2Name)a.push(tm.Sub2Name);
  }
  return a;
}
function selOpts(list,sel){
  return list.map(function(n){
    var e=String(n).replace(/"/g,"&quot;");
    return '<option value="'+e+'"'+(n===sel?" selected":"")+'>'+n+'</option>';
  }).join("");
}
function openAssign(mid){
  var m=null;for(var i=0;i<A.matches.length;i++)if(A.matches[i].ID===mid){m=A.matches[i];break;}
  if(!m)return;A.sm=m;
  var t1=gt(m.Team1ID),t2=gt(m.Team2ID);
  var r1=roster(t1),r2=roster(t2);
  var c1=(m.T1Players||"").split(" & "),c2=(m.T2Players||"").split(" & ");
  var t1a=c1[0]||r1[0]||"",t1b=c1[1]||r1[1]||r1[0]||"";
  var t2a=c2[0]||r2[0]||"",t2b=c2[1]||r2[1]||r2[0]||"";
  $("md").innerHTML=
    '<div style="font-size:11px;color:#afe409;font-weight:700;letter-spacing:2px;margin-bottom:4px">ASSIGN PLAYERS FOR MATCH</div>'+
    '<div style="font-size:12px;color:#5a6e5a;margin-bottom:14px">Pick who actually plays this match.</div>'+
    '<div style="font-size:12px;font-weight:700;color:#afe409;margin-bottom:2px">'+(t1?t1.TeamName:"Team 1")+'</div>'+
    '<label>Player A</label><select id="t1a">'+selOpts(r1,t1a)+'</select>'+
    '<label>Player B</label><select id="t1b">'+selOpts(r1,t1b)+'</select>'+
    '<div style="font-size:12px;font-weight:700;color:#afe409;margin:14px 0 2px">'+(t2?t2.TeamName:"Team 2")+'</div>'+
    '<label>Player A</label><select id="t2a">'+selOpts(r2,t2a)+'</select>'+
    '<label>Player B</label><select id="t2b">'+selOpts(r2,t2b)+'</select>'+
    '<div style="margin-top:16px;display:flex;gap:10px">'+
    '<button class="btn" style="flex:1" onclick="saveAssign()">Assign Players</button>'+
    '<button class="bto" style="border-color:#5a6e5a;color:#5a6e5a" onclick="closeScore()">Cancel</button></div>'+
    '<div class="err" id="aserr"></div>';
  $("ov").style.display="flex";
}
function saveAssign(){
  var t1a=v("t1a"),t1b=v("t1b"),t2a=v("t2a"),t2b=v("t2b");
  var t1s=t1a+((t1b&&t1b!==t1a)?(" & "+t1b):"");
  var t2s=t2a+((t2b&&t2b!==t2a)?(" & "+t2b):"");
  tx("aserr","Saving...");
  call("assignMatchPlayers",[A.sm.ID,t1s,t2s],function(r){
    if(r&&r.ok){closeScore();toast(r.msg);load(function(){draw(A.tab);});}
    else{tx("aserr",r?r.msg:"Error occurred");}
  });
}

// ── Init ───────────────────────────────────────────────────────────────────────
buildNav();
// Load form URL in background
call("getFormUrl",[],function(r){if(r&&r.ok)A.formUrl=r.url;});
load(function(){dDash();});
</script>
